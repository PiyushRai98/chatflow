name: Build & Deploy

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/chat

jobs:
  build-images:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            context: .
            dockerfile: services/auth-service/Dockerfile
          - service: chat-service
            context: .
            dockerfile: services/chat-service/Dockerfile
          - service: message-service
            context: .
            dockerfile: services/message-service/Dockerfile
          - service: notification-service
            context: .
            dockerfile: services/notification-service/Dockerfile
          - service: api-gateway
            context: .
            dockerfile: services/api-gateway/Dockerfile
          - service: frontend
            context: .
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64

  deploy-staging:
    name: Deploy to Staging
    needs: build-images
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'
        
      - name: Install Kustomize
        run: |
          curl -s https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy to staging
        run: |
          export IMAGE_TAG=sha-$(git rev-parse --short HEAD)

          echo "Current directory:"
          pwd

          echo "Checking repository structure..."
          ls -R infrastructure

          OVERLAY_DIR="$GITHUB_WORKSPACE/infrastructure/kubernetes/overlays/staging"

          echo "Using overlay directory:"
          echo $OVERLAY_DIR

          if [ ! -d "$OVERLAY_DIR" ]; then
            echo "ERROR: Staging overlay directory not found"
            exit 1
          fi

          cd "$OVERLAY_DIR"

          kustomize edit set image \
            chat-auth-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-auth-service:$IMAGE_TAG \
            chat-chat-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-chat-service:$IMAGE_TAG \
            chat-message-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-message-service:$IMAGE_TAG \
            chat-notification-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-notification-service:$IMAGE_TAG \
            chat-api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api-gateway:$IMAGE_TAG

          kubectl apply -k "$OVERLAY_DIR"

          kubectl rollout status deployment/auth-service \
          -n chat-system-staging \
          --timeout=10m

  deploy-production:
    name: Deploy to Production (Blue/Green)
    needs: build-images
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Deploy green slot
        run: |
          export TAG=${{ github.ref_name }}
          export SLOT=green
          envsubst < infrastructure/kubernetes/overlays/production/kustomization.template.yaml \
            > infrastructure/kubernetes/overlays/production/kustomization.yaml
          kubectl apply -k infrastructure/kubernetes/overlays/production
          kubectl rollout status deployment -l slot=green -n chat-system --timeout=10m

      - name: Smoke test green
        run: |
          # Run health checks against green-* services
          ./scripts/smoke-test.sh https://green.api.chat.example.com

      - name: Switch traffic to green
        run: |
          kubectl patch service api-gateway -n chat-system \
            -p '{"spec":{"selector":{"slot":"green"}}}'

      - name: Cleanup blue
        run: |
          # Wait 5 minutes for in-flight connections to drain
          sleep 300
          kubectl delete deployment -l slot=blue -n chat-system --ignore-not-found
