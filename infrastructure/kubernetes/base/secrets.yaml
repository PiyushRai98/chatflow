# Template — replace values and apply with kubectl, or use sealed-secrets / external-secrets in production.
apiVersion: v1
kind: Secret
metadata:
  name: chat-secrets
  namespace: chat-system
type: Opaque
stringData:
  # JWT
  JWT_SECRET: "REPLACE_WITH_STRONG_256BIT_SECRET"
  JWT_REFRESH_SECRET: "REPLACE_WITH_DIFFERENT_STRONG_SECRET"

  # PostgreSQL
  PG_PASSWORD: "REPLACE_ME"

  # AWS S3
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"

  # Web Push (VAPID)
  VAPID_PUBLIC_KEY: "REPLACE_ME"
  VAPID_PRIVATE_KEY: "REPLACE_ME"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-config
  namespace: chat-system
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"

  # Service URLs (internal DNS)
  AUTH_SERVICE_URL: "http://auth-service:3001"
  CHAT_SERVICE_URL: "http://chat-service:3002"
  MESSAGE_SERVICE_URL: "http://message-service:3003"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3004"

  # Infrastructure
  PG_HOST: "postgres"
  PG_PORT: "5432"
  PG_DATABASE: "chat_users"
  PG_USER: "postgres"

  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  KAFKA_BROKERS: "kafka:9092"

  MONGODB_URI: "mongodb://mongodb:27017/chat_messages"

  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET: "chat-media-uploads"

  CORS_ORIGINS: "https://chat.example.com"
