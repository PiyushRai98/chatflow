apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: chat-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: chat-notification-service
          ports:
            - containerPort: 3004
              name: http
          envFrom:
            - configMapRef:
                name: chat-config
          env:
            - name: PORT
              value: "3004"
            - name: VAPID_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: chat-secrets
                  key: VAPID_PUBLIC_KEY
            - name: VAPID_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: chat-secrets
                  key: VAPID_PRIVATE_KEY
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: chat-system
spec:
  selector:
    app: notification-service
  ports:
    - port: 3004
      targetPort: 3004
